<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile & Links</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <button id="themeToggle" class="theme-btn">🌙 ダークモード</button>
  </header>

  <main class="container">
    <section class="profile-card">
      <img src="images/icon.png" alt="プロフィール画像" class="icon" />
      <h1>あなたの名前</h1>
      <p class="bio">
        はじめまして。Webシステムエンジニアを目指して勉強中です。
        HTML/CSS/JavaScript と AWS/GitHub を使ってこのサイトを作成しました。
      </p>

      <div class="links">
        <a href="https://github.com/yourname" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="https://x.com/yourname" target="_blank" rel="noopener noreferrer">X</a>
        <a href="https://your-blog.example.com" target="_blank" rel="noopener noreferrer">Blog</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
